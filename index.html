<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Licznik Prądu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f12;
    --bg2: #17171d;
    --bg3: #1e1e26;
    --bg4: #25252f;
    --border: #2e2e3a;
    --border2: #3d3d4f;
    --text: #e8e8f0;
    --text2: #9898b0;
    --text3: #5a5a72;
    --accent: #7c6af5;
    --accent2: #5b4fd4;
    --green: #3dd68c;
    --green2: #1fa05f;
    --amber: #f5a623;
    --amber2: #c4831a;
    --red: #f55a5a;
    --red2: #c43d3d;
    --cyan: #3dd6d6;
    --radius: 10px;
    --radius-lg: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 80px 0;
  }
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  header h1 span { color: var(--accent); }
  .header-actions { display: flex; gap: 8px; }
  button {
    font-family: 'Syne', sans-serif;
    cursor: pointer;
    border: none;
    outline: none;
  }
  .btn {
    background: var(--bg4);
    color: var(--text);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.15s;
  }
  .btn:hover { background: var(--bg3); border-color: var(--accent); color: var(--accent); }
  .btn-accent {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn-accent:hover { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .btn-green {
    background: var(--green2);
    color: #fff;
    border-color: var(--green2);
  }
  .btn-green:hover { background: var(--green); border-color: var(--green); color: #000; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-danger { border-color: var(--red2); color: var(--red); }
  .btn-danger:hover { background: var(--red2); color: #fff; }
  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 4px;
    margin-bottom: 24px;
  }
  .tab {
    flex: 1;
    background: transparent;
    color: var(--text2);
    border: none;
    border-radius: var(--radius);
    padding: 10px 8px;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.15s;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
  }
  .tab.active {
    background: var(--accent);
    color: #fff;
  }
  .tab:not(.active):hover { background: var(--bg3); color: var(--text); }
  .section { display: none; }
  .section.active { display: block; }
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .meter-grid {
    display: grid;
    gap: 12px;
  }
  .meter-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 12px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    transition: border-color 0.15s;
  }
  .meter-row:hover { border-color: var(--border2); }
  .meter-row.type-production { border-left: 3px solid var(--green); }
  .meter-row.type-consumption { border-left: 3px solid var(--accent); }
  .meter-row.type-main-production { border-left: 3px solid var(--amber); }
  .meter-row.type-main-consumption { border-left: 3px solid var(--cyan); }
  .meter-info { display: flex; flex-direction: column; gap: 4px; }
  .meter-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .meter-type-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }
  .badge-production { background: #1a3d2e; color: var(--green); }
  .badge-consumption { background: #2a2050; color: var(--accent); }
  .badge-main-production { background: #3d2e0a; color: var(--amber); }
  .badge-main-consumption { background: #0a3d3d; color: var(--cyan); }
  .badge-sub { background: #2a2a3a; color: var(--text2); }
  .meter-reading {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text3);
  }
  .meter-input-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }
  .meter-input-row { display: flex; align-items: center; gap: 6px; }
  input[type="number"], input[type="text"], input[type="date"] {
    background: var(--bg4);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    padding: 8px 10px;
    transition: border-color 0.15s;
    outline: none;
    width: 130px;
  }
  input[type="number"]:focus, input[type="text"]:focus, input[type="date"]:focus {
    border-color: var(--accent);
  }
  input[type="number"].wide, input[type="text"].wide { width: 200px; }
  .meter-unit { font-size: 12px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
  .meter-delta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
  }
  .delta-pos { color: var(--green); }
  .delta-neg { color: var(--red); }
  .delta-zero { color: var(--text3); }
  .date-picker-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .date-picker-row label { font-size: 14px; color: var(--text2); font-weight: 600; }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .stat-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; color: var(--text); }
  .stat-value.green { color: var(--green); }
  .stat-value.amber { color: var(--amber); }
  .stat-value.cyan { color: var(--cyan); }
  .stat-unit { font-size: 12px; color: var(--text3); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
  .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    background: var(--bg3);
    color: var(--text2);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg3); }
  .td-name { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px; }
  .td-pos { color: var(--green); }
  .td-neg { color: var(--red); }
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text3);
    font-size: 15px;
  }
  .empty-state strong { display: block; font-size: 18px; margin-bottom: 8px; color: var(--text2); }
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 24px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h2 { font-size: 18px; font-weight: 800; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
  .form-group input, .form-group select {
    width: 100%;
    background: var(--bg4);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
  }
  .form-group select { cursor: pointer; }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .meter-actions { display: flex; gap: 6px; align-items: center; }
  .manage-list { display: flex; flex-direction: column; gap: 8px; }
  .manage-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
  }
  .manage-item-info { display: flex; flex-direction: column; gap: 4px; }
  .manage-item-name { font-size: 14px; font-weight: 600; }
  .manage-item-type { font-size: 12px; color: var(--text3); }
  .import-area {
    width: 100%;
    background: var(--bg4);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 12px;
    resize: vertical;
    min-height: 120px;
    outline: none;
  }
  .import-area:focus { border-color: var(--accent); }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg4);
    border: 1px solid var(--green2);
    color: var(--green);
    padding: 10px 20px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .chart-bar-wrap { margin-top: 16px; }
  .chart-bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 12px;
  }
  .chart-bar-label { width: 70px; text-align: right; color: var(--text2); flex-shrink: 0; font-family: 'JetBrains Mono', monospace; }
  .chart-bar-track { flex: 1; background: var(--bg4); border-radius: 4px; height: 20px; overflow: hidden; }
  .chart-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; display: flex; align-items: center; padding-left: 8px; font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .fill-cons { background: linear-gradient(90deg, var(--accent2), var(--accent)); color: #fff; }
  .fill-prod { background: linear-gradient(90deg, var(--green2), var(--green)); color: #000; }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text3);
    margin: 20px 0 10px;
  }
  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  select {
    background: var(--bg4);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    cursor: pointer;
  }
  select:focus { border-color: var(--accent); }
  @media (max-width: 600px) {
    .meter-row { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .header-actions { gap: 4px; }
    .btn { padding: 7px 10px; font-size: 12px; }
  }
</style>
</head>
<body>

<header>
  <h1>⚡ Licznik <span>Prądu</span></h1>
  <div class="header-actions">
    <button class="btn" onclick="openManage()">Zarządzaj licznikami</button>
    <button class="btn" onclick="openExport()">Eksport / Import</button>
  </div>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('wpis')">Dzienny wpis</button>
    <button class="tab" onclick="switchTab('historia')">Historia dni</button>
    <button class="tab" onclick="switchTab('tygodnie')">Tygodniowo</button>
    <button class="tab" onclick="switchTab('miesiace')">Miesięcznie</button>
  </div>

  <!-- TAB: WPIS -->
  <div id="tab-wpis" class="section active">
    <div class="date-picker-row">
      <label for="date-input">Data wpisu:</label>
      <input type="date" id="date-input">
      <button class="btn btn-sm" onclick="setToday()">Dziś</button>
      <button class="btn btn-accent" onclick="saveEntry()">💾 Zapisz wpis</button>
    </div>

    <div id="meters-wpis"></div>
  </div>

  <!-- TAB: HISTORIA -->
  <div id="tab-historia" class="section">
    <div class="card">
      <div class="card-header">
        <span class="card-title">Historia wpisów</span>
        <button class="btn btn-sm btn-danger" onclick="clearConfirm()">🗑 Wyczyść wszystko</button>
      </div>
      <div id="historia-table"></div>
    </div>
  </div>

  <!-- TAB: TYGODNIE -->
  <div id="tab-tygodnie" class="section">
    <div class="card">
      <div class="card-header"><span class="card-title">Podsumowanie tygodniowe</span></div>
      <div id="tygodnie-content"></div>
    </div>
  </div>

  <!-- TAB: MIESIACE -->
  <div id="tab-miesiace" class="section">
    <div class="card">
      <div class="card-header"><span class="card-title">Podsumowanie miesięczne</span></div>
      <select id="year-select" onchange="renderMonths()" style="margin-bottom:16px;"></select>
      <div id="miesiace-content"></div>
    </div>
  </div>
</div>

<!-- MODAL: ZARZĄDZAJ -->
<div id="modal-manage" class="modal-overlay" style="display:none;">
  <div class="modal">
    <h2>Zarządzaj licznikami</h2>
    <div class="manage-list" id="manage-list"></div>
    <hr class="divider">
    <p class="section-title">Dodaj nowy licznik</p>
    <div class="form-group">
      <label>Nazwa licznika</label>
      <input type="text" id="new-meter-name" placeholder="np. Boiler, Garaż...">
    </div>
    <div class="form-group">
      <label>Typ</label>
      <select id="new-meter-type">
        <option value="main-consumption">Główny — zużycie</option>
        <option value="main-production">Główny — wprowadzenie (panele)</option>
        <option value="consumption">Podlicznik — zużycie</option>
        <option value="production">Podlicznik — wprowadzenie</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal('modal-manage')">Zamknij</button>
      <button class="btn btn-accent" onclick="addMeter()">Dodaj licznik</button>
    </div>
  </div>
</div>

<!-- MODAL: EKSPORT/IMPORT -->
<div id="modal-export" class="modal-overlay" style="display:none;">
  <div class="modal">
    <h2>Eksport / Import danych</h2>
    <p class="section-title">Eksport</p>
    <div style="display:flex;gap:8px;margin-bottom:20px;">
      <button class="btn btn-green" onclick="exportData('json')">📦 Eksportuj JSON</button>
      <button class="btn" onclick="exportData('txt')">📄 Eksportuj TXT</button>
    </div>
    <p class="section-title">Import (wklej JSON)</p>
    <textarea class="import-area" id="import-area" placeholder='Wklej tutaj wcześniej wyeksportowane dane JSON...'></textarea>
    <div class="form-actions">
      <button class="btn" onclick="closeModal('modal-export')">Zamknij</button>
      <button class="btn btn-accent" onclick="importData()">📥 Importuj dane</button>
    </div>
  </div>
</div>

<!-- MODAL: EDYTUJ LICZNIK -->
<div id="modal-edit" class="modal-overlay" style="display:none;">
  <div class="modal">
    <h2>Edytuj licznik</h2>
    <div class="form-group">
      <label>Nazwa</label>
      <input type="text" id="edit-meter-name">
    </div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal('modal-edit')">Anuluj</button>
      <button class="btn btn-accent" onclick="saveEditMeter()">Zapisz</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'licznik_pradu_v2';

let state = {
  meters: [],
  entries: {}
};

const DEFAULT_METERS = [
  { id: 'm1', name: 'Zużycie główne', type: 'main-consumption' },
  { id: 'm2', name: 'Wprowadzenie z paneli', type: 'main-production' },
  { id: 'm3', name: 'Podlicznik zużycia 1', type: 'consumption' },
  { id: 'm4', name: 'Podlicznik zużycia 2', type: 'consumption' },
  { id: 'm5', name: 'Podlicznik zużycia 3', type: 'consumption' },
  { id: 'm6', name: 'Podlicznik wprowadzenia 1', type: 'production' },
  { id: 'm7', name: 'Podlicznik wprowadzenia 2', type: 'production' },
];

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      state = JSON.parse(raw);
      if (!state.meters || state.meters.length === 0) state.meters = DEFAULT_METERS;
      if (!state.entries) state.entries = {};
    } else {
      state.meters = DEFAULT_METERS;
      state.entries = {};
    }
  } catch(e) {
    state.meters = DEFAULT_METERS;
    state.entries = {};
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function getToday() {
  return new Date().toISOString().slice(0,10);
}

function fmtKwh(val) {
  if (val === null || val === undefined || isNaN(val)) return '—';
  return Number(val).toLocaleString('pl-PL', {minimumFractionDigits:0, maximumFractionDigits:2}) + ' kWh';
}

function fmtReading(val) {
  if (val === null || val === undefined || val === '' || isNaN(Number(val))) return '—';
  return Number(val).toLocaleString('pl-PL', {minimumFractionDigits:0, maximumFractionDigits:2});
}

function typeBadge(type) {
  const map = {
    'main-consumption': ['Główny zużycie','badge-main-consumption'],
    'main-production': ['Główny panele','badge-main-production'],
    'consumption': ['Podlicznik zużycie','badge-consumption'],
    'production': ['Podlicznik wprowadzenie','badge-production'],
  };
  const [label, cls] = map[type] || ['—','badge-sub'];
  return `<span class="meter-type-badge ${cls}">${label}</span>`;
}

function typeClass(type) {
  return 'type-' + (type || 'consumption');
}

function getPrevValue(meterId, date) {
  const dates = Object.keys(state.entries).filter(d => d < date).sort();
  for (let i = dates.length - 1; i >= 0; i--) {
    const entry = state.entries[dates[i]];
    if (entry && entry[meterId] !== undefined && entry[meterId] !== '' && !isNaN(Number(entry[meterId]))) {
      return Number(entry[meterId]);
    }
  }
  return null;
}

function getDelta(meterId, date) {
  const cur = state.entries[date] && state.entries[date][meterId];
  if (cur === undefined || cur === '' || isNaN(Number(cur))) return null;
  const prev = getPrevValue(meterId, date);
  if (prev === null) return null;
  return Number(cur) - prev;
}

function renderWpis() {
  const date = document.getElementById('date-input').value;
  const entry = state.entries[date] || {};
  const container = document.getElementById('meters-wpis');

  const groups = [
    { label: 'Liczniki główne', types: ['main-consumption','main-production'] },
    { label: 'Podliczniki zużycia', types: ['consumption'] },
    { label: 'Podliczniki wprowadzenia', types: ['production'] },
  ];

  let html = '';
  for (const g of groups) {
    const meters = state.meters.filter(m => g.types.includes(m.type));
    if (meters.length === 0) continue;
    html += `<div class="section-title">${g.label}</div>`;
    html += `<div class="meter-grid">`;
    for (const m of meters) {
      const val = entry[m.id] !== undefined ? entry[m.id] : '';
      const prev = getPrevValue(m.id, date);
      const delta = (val !== '' && prev !== null) ? (Number(val) - prev) : null;
      let deltaHtml = '';
      if (delta !== null) {
        const cls = delta > 0 ? 'delta-pos' : delta < 0 ? 'delta-neg' : 'delta-zero';
        const sign = delta > 0 ? '+' : '';
        deltaHtml = `<span class="meter-delta ${cls}">${sign}${fmtKwh(delta)}</span>`;
      }
      html += `
        <div class="meter-row ${typeClass(m.type)}">
          <div class="meter-info">
            <div class="meter-name">${m.name} ${typeBadge(m.type)}</div>
            <div class="meter-reading">Poprzedni: ${prev !== null ? fmtReading(prev) + ' kWh' : 'brak danych'}</div>
          </div>
          <div>${deltaHtml}</div>
          <div class="meter-input-wrap">
            <div class="meter-input-row">
              <input type="number" step="0.01" placeholder="np. 75913" value="${val}"
                id="inp-${m.id}" onchange="updateInput('${m.id}')" oninput="updateInput('${m.id}')">
              <span class="meter-unit">kWh</span>
            </div>
          </div>
        </div>`;
    }
    html += `</div>`;
  }

  container.innerHTML = html;
}

function updateInput(meterId) {
  const date = document.getElementById('date-input').value;
  if (!state.entries[date]) state.entries[date] = {};
  const val = document.getElementById('inp-' + meterId).value;
  state.entries[date][meterId] = val === '' ? undefined : Number(val);

  const prev = getPrevValue(meterId, date);
  const inp = document.getElementById('inp-' + meterId);
  if (!inp) return;
  const row = inp.closest('.meter-row');
  if (!row) return;
  const deltaEl = row.querySelector('.meter-delta');
  const wrapEl = row.querySelector('.meter-input-wrap').previousElementSibling;

  const cur = val !== '' ? Number(val) : null;
  if (cur !== null && prev !== null) {
    const delta = cur - prev;
    const cls = delta > 0 ? 'delta-pos' : delta < 0 ? 'delta-neg' : 'delta-zero';
    const sign = delta > 0 ? '+' : '';
    const newHtml = `<span class="meter-delta ${cls}">${sign}${fmtKwh(delta)}</span>`;
    wrapEl.innerHTML = newHtml;
  } else {
    wrapEl.innerHTML = '';
  }
}

function saveEntry() {
  const date = document.getElementById('date-input').value;
  if (!date) { showToast('Wybierz datę!'); return; }
  for (const m of state.meters) {
    const inp = document.getElementById('inp-' + m.id);
    if (inp) {
      const v = inp.value;
      if (!state.entries[date]) state.entries[date] = {};
      state.entries[date][m.id] = v === '' ? undefined : Number(v);
    }
  }
  saveState();
  showToast('Wpis zapisany ✓');
}

function renderHistoria() {
  const container = document.getElementById('historia-table');
  const dates = Object.keys(state.entries).sort().reverse();
  if (dates.length === 0) {
    container.innerHTML = '<div class="empty-state"><strong>Brak wpisów</strong>Dodaj pierwszy wpis w zakładce "Dzienny wpis"</div>';
    return;
  }

  let html = '<div class="table-wrap"><table><thead><tr><th>Data</th>';
  for (const m of state.meters) html += `<th>${m.name}</th>`;
  html += '<th>Zużycie (suma)</th><th>Wprowadzenie (suma)</th></tr></thead><tbody>';

  for (const date of dates) {
    const entry = state.entries[date] || {};
    html += `<tr><td class="td-name">${date}</td>`;
    let totalCons = 0, totalProd = 0;
    let hasCons = false, hasProd = false;
    for (const m of state.meters) {
      const delta = getDelta(m.id, date);
      if (delta !== null) {
        const cls = delta > 0 ? 'td-pos' : delta < 0 ? 'td-neg' : '';
        const sign = delta > 0 ? '+' : '';
        html += `<td class="${cls}">${fmtReading(entry[m.id])}<br><small style="color:var(--text3)">${sign}${Number(delta).toFixed(2)}</small></td>`;
        if (m.type === 'main-consumption' || m.type === 'consumption') {
          totalCons += delta; hasCons = true;
        }
        if (m.type === 'main-production' || m.type === 'production') {
          totalProd += delta; hasProd = true;
        }
      } else {
        const v = entry[m.id];
        html += `<td>${v !== undefined ? fmtReading(v) : '—'}</td>`;
      }
    }
    html += `<td class="td-pos">${hasCons ? fmtKwh(totalCons) : '—'}</td>`;
    html += `<td style="color:var(--amber)">${hasProd ? fmtKwh(totalProd) : '—'}</td>`;
    html += '</tr>';
  }
  html += '</tbody></table></div>';
  container.innerHTML = html;
}

function getWeekKey(date) {
  const d = new Date(date);
  const day = d.getDay() || 7;
  d.setDate(d.getDate() + 4 - day);
  const year = d.getFullYear();
  const week = Math.ceil(((d - new Date(year,0,1))/86400000 + 1)/7);
  return `${year}-W${String(week).padStart(2,'0')}`;
}

function aggregatePeriod(periodFn) {
  const result = {};
  const dates = Object.keys(state.entries).sort();
  for (const date of dates) {
    const key = periodFn(date);
    if (!result[key]) result[key] = { dates: [], cons: {}, prod: {} };
    result[key].dates.push(date);
    for (const m of state.meters) {
      const delta = getDelta(m.id, date);
      if (delta === null) continue;
      if (m.type === 'main-consumption' || m.type === 'consumption') {
        result[key].cons[m.id] = (result[key].cons[m.id] || 0) + delta;
      }
      if (m.type === 'main-production' || m.type === 'production') {
        result[key].prod[m.id] = (result[key].prod[m.id] || 0) + delta;
      }
    }
  }
  return result;
}

function renderPeriodTable(data, container, labelFn) {
  const keys = Object.keys(data).sort().reverse();
  if (keys.length === 0) {
    container.innerHTML = '<div class="empty-state"><strong>Brak danych</strong>Potrzebujesz przynajmniej 2 wpisów z różnych dat.</div>';
    return;
  }

  const maxCons = Math.max(0, ...keys.map(k => Object.values(data[k].cons).reduce((a,b)=>a+b,0)));
  const maxProd = Math.max(0, ...keys.map(k => Object.values(data[k].prod).reduce((a,b)=>a+b,0)));

  let html = '';
  for (const key of keys) {
    const d = data[key];
    const totalCons = Object.values(d.cons).reduce((a,b)=>a+b,0);
    const totalProd = Object.values(d.prod).reduce((a,b)=>a+b,0);
    const consPct = maxCons ? (totalCons/maxCons*100).toFixed(1) : 0;
    const prodPct = maxProd ? (totalProd/maxProd*100).toFixed(1) : 0;
    const label = labelFn(key, d.dates);

    html += `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;">`;
    html += `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">`;
    html += `<span style="font-size:14px;font-weight:600">${label}</span>`;
    html += `<span style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace">${d.dates[0]} → ${d.dates[d.dates.length-1]}</span>`;
    html += `</div>`;

    html += `<div class="chart-bar-wrap">`;
    html += `<div class="chart-bar-row">
      <span class="chart-bar-label">Zużycie</span>
      <div class="chart-bar-track">
        <div class="chart-bar-fill fill-cons" style="width:${consPct}%">${totalCons > 0 ? fmtKwh(totalCons) : ''}</div>
      </div>
    </div>`;
    html += `<div class="chart-bar-row">
      <span class="chart-bar-label">Panele</span>
      <div class="chart-bar-track">
        <div class="chart-bar-fill fill-prod" style="width:${prodPct}%">${totalProd > 0 ? fmtKwh(totalProd) : ''}</div>
      </div>
    </div>`;
    html += `</div>`;

    const consMeterIds = Object.keys(d.cons);
    const prodMeterIds = Object.keys(d.prod);
    if (consMeterIds.length > 1 || prodMeterIds.length > 1) {
      html += `<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:8px;">`;
      for (const mid of consMeterIds) {
        const m = state.meters.find(x=>x.id===mid);
        if (m) html += `<span style="font-size:11px;background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-family:'JetBrains Mono',monospace">${m.name}: <span style="color:var(--accent)">${fmtKwh(d.cons[mid])}</span></span>`;
      }
      for (const mid of prodMeterIds) {
        const m = state.meters.find(x=>x.id===mid);
        if (m) html += `<span style="font-size:11px;background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-family:'JetBrains Mono',monospace">${m.name}: <span style="color:var(--amber)">${fmtKwh(d.prod[mid])}</span></span>`;
      }
      html += `</div>`;
    }

    html += `</div>`;
  }
  container.innerHTML = html;
}

function renderWeeks() {
  const data = aggregatePeriod(getWeekKey);
  const container = document.getElementById('tygodnie-content');
  renderPeriodTable(data, container, (key, dates) => `Tydzień ${key.replace('-W','  tydz. ')}`);
}

function renderMonths() {
  const yearSel = document.getElementById('year-select').value;
  const data = aggregatePeriod(d => d.slice(0,7));
  const container = document.getElementById('miesiace-content');
  const filtered = {};
  for (const k of Object.keys(data)) {
    if (!yearSel || k.startsWith(yearSel)) filtered[k] = data[k];
  }
  const MONTHS = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];
  renderPeriodTable(filtered, container, (key) => {
    const [y,m] = key.split('-');
    return `${MONTHS[parseInt(m)-1]} ${y}`;
  });
}

function populateYearSelect() {
  const sel = document.getElementById('year-select');
  const years = [...new Set(Object.keys(state.entries).map(d=>d.slice(0,4)))].sort().reverse();
  if (years.length === 0) years.push(new Date().getFullYear().toString());
  sel.innerHTML = years.map(y=>`<option value="${y}">${y}</option>`).join('');
}

function renderManage() {
  const list = document.getElementById('manage-list');
  if (state.meters.length === 0) {
    list.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:8px 0;">Brak liczników.</div>';
    return;
  }
  list.innerHTML = state.meters.map(m => `
    <div class="manage-item">
      <div class="manage-item-info">
        <div class="manage-item-name">${m.name} ${typeBadge(m.type)}</div>
        <div class="manage-item-type">ID: ${m.id}</div>
      </div>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-sm" onclick="editMeter('${m.id}')">Edytuj</button>
        <button class="btn btn-sm btn-danger" onclick="deleteMeter('${m.id}')">Usuń</button>
      </div>
    </div>`).join('');
}

let editingMeterId = null;
function editMeter(id) {
  const m = state.meters.find(x=>x.id===id);
  if (!m) return;
  editingMeterId = id;
  document.getElementById('edit-meter-name').value = m.name;
  document.getElementById('modal-edit').style.display = 'flex';
}
function saveEditMeter() {
  const m = state.meters.find(x=>x.id===editingMeterId);
  if (!m) return;
  const name = document.getElementById('edit-meter-name').value.trim();
  if (!name) return;
  m.name = name;
  saveState();
  renderManage();
  renderWpis();
  closeModal('modal-edit');
  showToast('Nazwa zaktualizowana ✓');
}

function deleteMeter(id) {
  if (!confirm('Usunąć ten licznik? Dane historyczne z nim związane zostaną zachowane.')) return;
  state.meters = state.meters.filter(m=>m.id!==id);
  saveState();
  renderManage();
  renderWpis();
  showToast('Licznik usunięty');
}

function addMeter() {
  const name = document.getElementById('new-meter-name').value.trim();
  const type = document.getElementById('new-meter-type').value;
  if (!name) { showToast('Podaj nazwę!'); return; }
  const id = 'm' + Date.now();
  state.meters.push({ id, name, type });
  saveState();
  renderManage();
  renderWpis();
  document.getElementById('new-meter-name').value = '';
  showToast('Licznik dodany ✓');
}

function openManage() {
  renderManage();
  document.getElementById('modal-manage').style.display = 'flex';
}

function openExport() {
  document.getElementById('import-area').value = '';
  document.getElementById('modal-export').style.display = 'flex';
}

function closeModal(id) {
  document.getElementById(id).style.display = 'none';
}

function exportData(format) {
  const exportObj = { meters: state.meters, entries: state.entries, exportDate: new Date().toISOString() };
  if (format === 'json') {
    const blob = new Blob([JSON.stringify(exportObj, null, 2)], {type:'application/json'});
    download(blob, 'licznik-pradu.json');
  } else {
    let txt = `LICZNIK PRĄDU — EKSPORT ${new Date().toLocaleString('pl-PL')}\n${'='.repeat(60)}\n\n`;
    txt += `LICZNIKI:\n`;
    for (const m of state.meters) txt += `  ${m.name} [${m.type}] (${m.id})\n`;
    txt += `\nWPISY:\n`;
    const dates = Object.keys(state.entries).sort();
    for (const date of dates) {
      txt += `\n${date}:\n`;
      const entry = state.entries[date];
      for (const m of state.meters) {
        const v = entry[m.id];
        const delta = getDelta(m.id, date);
        txt += `  ${m.name}: ${v !== undefined ? v : '—'} kWh`;
        if (delta !== null) txt += `  (${delta > 0 ? '+' : ''}${delta.toFixed(2)} kWh)`;
        txt += '\n';
      }
    }
    const blob = new Blob([txt], {type:'text/plain;charset=utf-8'});
    download(blob, 'licznik-pradu.txt');
  }
}

function download(blob, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
  showToast('Eksportowano ✓');
}

function importData() {
  const raw = document.getElementById('import-area').value.trim();
  if (!raw) { showToast('Wklej dane JSON!'); return; }
  try {
    const parsed = JSON.parse(raw);
    if (!parsed.meters || !parsed.entries) throw new Error('Nieprawidłowy format');
    if (!confirm('Import zastąpi WSZYSTKIE obecne dane. Kontynuować?')) return;
    state.meters = parsed.meters;
    state.entries = parsed.entries;
    saveState();
    renderWpis();
    renderHistoria();
    populateYearSelect();
    closeModal('modal-export');
    showToast('Import zakończony pomyślnie ✓');
  } catch(e) {
    showToast('Błąd: nieprawidłowy plik JSON');
  }
}

function clearConfirm() {
  if (!confirm('Usunąć WSZYSTKIE wpisy? Liczniki zostaną zachowane.')) return;
  state.entries = {};
  saveState();
  renderHistoria();
  renderWpis();
  showToast('Wpisy wyczyszczone');
}

function switchTab(tab) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  event.target.classList.add('active');
  if (tab === 'historia') renderHistoria();
  if (tab === 'tygodnie') renderWeeks();
  if (tab === 'miesiace') { populateYearSelect(); renderMonths(); }
}

function setToday() {
  document.getElementById('date-input').value = getToday();
  renderWpis();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

document.getElementById('date-input').addEventListener('change', renderWpis);
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.style.display='none'; });
});

loadState();
setToday();
</script>
</body>
</html>
